name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.keystore"
            echo "Decoded release keystore."
          else
            echo "No keystore secret available; release build will fall back to debug signing."
          fi

      - name: Build release APK
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/DriveBrowser-${GITHUB_REF_NAME}.apk"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DriveBrowser-debug-apk
          path: dist/*.apk

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Signed release build of DriveBrowser ${{ github.ref_name }}.

            Sideload the attached APK. Updates install over previous DriveBrowser
            versions (same signing key). Requires Android 15+ and enabling
            "Unknown sources" in Android Auto developer settings.
