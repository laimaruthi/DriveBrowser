name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk "dist/DriveBrowser-${GITHUB_REF_NAME}-debug.apk"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DriveBrowser-debug-apk
          path: dist/*.apk

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Debug build of DriveBrowser ${{ github.ref_name }}.

            Sideload the attached APK. Requires Android 15+ and enabling
            "Unknown sources" in Android Auto developer settings.
